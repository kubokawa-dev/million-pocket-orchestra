# Numbers3 平日分析。Supabase: numbers3_draws 等（apps/web/supabase/migrations）
name: Daily Numbers3 Analysis

on:
  workflow_dispatch:
    inputs:
      draw_number:
        description: "分析対象回号（空なら自動）"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "50 3 * * 1-5"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_USE_REST: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database
        run: python tools/utils.py

      - name: Load Numbers3 historical CSV into SQLite
        run: python tools/load_numbers3_csv_to_sqlite.py

      - name: Scrape latest Numbers3 (if script exists)
        run: |
          if [ -f "tools/scrape_numbers3_rakuten.py" ]; then
            python tools/scrape_numbers3_rakuten.py
          else
            echo "tools/scrape_numbers3_rakuten.py not found. skip."
          fi

      - name: Analyze prediction result (if script exists)
        run: |
          DRAW="${{ inputs.draw_number }}"
          if [ -f "numbers3/analyze_prediction_result.py" ]; then
            if [ -n "$DRAW" ]; then
              python numbers3/analyze_prediction_result.py --draw "$DRAW" || true
            else
              python numbers3/analyze_prediction_result.py || true
            fi
          else
            echo "numbers3/analyze_prediction_result.py not found. skip."
          fi

      - name: Update model (if script exists)
        run: |
          if [ -f "numbers3/update_model.py" ]; then
            python numbers3/update_model.py --auto || true
          else
            echo "numbers3/update_model.py not found. skip."
          fi

      - name: Upsert Numbers3 draws to Supabase
        run: |
          echo "📤 numbers3/*.csv → Supabase numbers3_draws（本番・リモート同期）"
          python tools/load_numbers3_csv_to_postgres.py --skip-if-unconfigured

      - name: Upsert numbers3_daily_prediction_documents (Supabase)
        run: |
          python tools/load_numbers3_daily_json_to_postgres.py --skip-if-unconfigured --chunk-size 12

      - name: Commit analysis artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/analysis_*.md || true
          git add numbers3/*.json || true
          git add numbers3/*.csv || true
          if git diff --staged --quiet; then
            echo "No analysis updates."
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
            git commit -m "📊 Numbers3 analysis $TIMESTAMP"
            bash tools/git_push_with_retry.sh main
          fi
