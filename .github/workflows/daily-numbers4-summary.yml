name: Daily Numbers4 Summary & Notification

on:
  schedule:
    # 平日（月〜金）JST 16:00 に実行
    # JST 16:00 = UTC 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  summarize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      - name: Generate prediction summary
        id: summary
        run: |
          # 予測サマリーをMarkdownで生成
          OUTPUT_FILE="predictions/numbers4_$(date '+%Y%m%d').md"
          python numbers4/summarize_daily_predictions.py --output "$OUTPUT_FILE"
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
          
          # サマリーの内容を環境変数に保存（通知用）
          echo "SUMMARY_CONTENT<<EOF" >> $GITHUB_ENV
          head -100 "$OUTPUT_FILE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      
      - name: Commit summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add predictions/
          git diff --staged --quiet || git commit -m "📊 Numbers4 daily summary $(date '+%Y-%m-%d')"
          git push
      
