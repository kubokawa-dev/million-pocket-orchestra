name: Daily Numbers4 Summary & Notification

on:
  schedule:
    # 平日（月〜金）JST 16:00 に実行
    # JST 16:00 = UTC 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  summarize:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Pull latest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase || true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Get latest draw number
        id: draw
        run: |
          echo "📂 Looking for latest prediction data..."
          # 新形式: numbers4_{draw}.json を優先
          LATEST_FILE=$(ls -1 predictions/daily/numbers4_*.json 2>/dev/null | sort -t'_' -k2 -n | tail -1 || true)
          
          if [ -z "$LATEST_FILE" ]; then
            # 旧形式: {draw}.json にフォールバック
            LATEST_FILE=$(ls -1 predictions/daily/*.json 2>/dev/null | grep -E '/[0-9]+\.json$' | sort -t'/' -k3 -n | tail -1 || true)
          fi
          
          if [ -n "$LATEST_FILE" ]; then
            # ファイル名から回号を抽出 (numbers4_6891.json -> 6891 or 6891.json -> 6891)
            BASENAME=$(basename "$LATEST_FILE" .json)
            if [[ "$BASENAME" == numbers4_* ]]; then
              DRAW_NUMBER="${BASENAME#numbers4_}"
            else
              DRAW_NUMBER="$BASENAME"
            fi
            echo "✅ Found $LATEST_FILE (Draw #$DRAW_NUMBER)"
            echo "draw_number=$DRAW_NUMBER" >> $GITHUB_OUTPUT
            python -c "
          import json
          with open('$LATEST_FILE', 'r') as f:
              data = json.load(f)
          print(f'  📊 Prediction count: {len(data.get(\"predictions\", []))}')
          print(f'  🎯 Target draw: {data.get(\"target_draw_number\", data.get(\"draw_number\"))}')
          "
          else
            # 旧形式（日付ベース）を探す
            TODAY=$(date '+%Y%m%d')
            if [ -f "predictions/daily/${TODAY}.json" ]; then
              echo "✅ Found predictions/daily/${TODAY}.json (legacy format)"
              DRAW_NUMBER=$(python -c "
          import json
          with open('predictions/daily/${TODAY}.json', 'r') as f:
              data = json.load(f)
          print(data.get('target_draw_number', ''))
          ")
              echo "draw_number=$DRAW_NUMBER" >> $GITHUB_OUTPUT
            else
              echo "⚠️ No prediction data found"
              echo "Available files:"
              ls -la predictions/daily/ || echo "No daily predictions directory"
            fi
          fi
      
      - name: Generate summary from JSON
        id: summary
        run: |
          DRAW_NUMBER="${{ steps.draw.outputs.draw_number }}"
          if [ -n "$DRAW_NUMBER" ]; then
            OUTPUT_FILE="predictions/numbers4_${DRAW_NUMBER}.md"
            python numbers4/summarize_from_json.py --draw "$DRAW_NUMBER" --output "$OUTPUT_FILE"
          else
            # 回号が取得できない場合は日付ベースで試行
            OUTPUT_FILE="predictions/numbers4_$(date '+%Y%m%d').md"
            python numbers4/summarize_from_json.py --output "$OUTPUT_FILE"
          fi
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
      
      - name: Commit summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add predictions/*.md || true
          
          if git diff --staged --quiet; then
            echo "📝 No summary to commit"
          else
            git commit -m "📊 Numbers4 daily summary $(date '+%Y-%m-%d')"
            git push origin main
            echo "✅ Summary committed and pushed!"
          fi
      
      - name: Summary
        run: |
          echo "✅ Summary generation completed!"
          echo "📄 Output: ${{ steps.summary.outputs.output_file }}"
      
