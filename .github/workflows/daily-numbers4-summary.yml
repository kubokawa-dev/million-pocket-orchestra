name: Daily Numbers4 Summary & Notification

on:
  schedule:
    # 平日（月〜金）JST 16:00 に実行
    # JST 16:00 = UTC 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  summarize:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Pull latest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase || true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check prediction data
        run: |
          echo "📂 Looking for today's prediction data..."
          TODAY=$(date '+%Y%m%d')
          if [ -f "predictions/daily/${TODAY}.json" ]; then
            echo "✅ Found predictions/daily/${TODAY}.json"
            python -c "
          import json
          with open('predictions/daily/${TODAY}.json', 'r') as f:
              data = json.load(f)
          print(f'  📊 Prediction count: {len(data.get(\"predictions\", []))}')
          print(f'  🎯 Target draw: {data.get(\"target_draw_number\")}')
          "
          else
            echo "⚠️ No prediction data for today (${TODAY})"
            echo "Available files:"
            ls -la predictions/daily/ || echo "No daily predictions directory"
          fi
      
      - name: Generate summary from JSON
        id: summary
        run: |
          OUTPUT_FILE="predictions/numbers4_$(date '+%Y%m%d').md"
          python numbers4/summarize_from_json.py --output "$OUTPUT_FILE"
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
      
      - name: Commit summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add predictions/*.md || true
          
          if git diff --staged --quiet; then
            echo "📝 No summary to commit"
          else
            git commit -m "📊 Numbers4 daily summary $(date '+%Y-%m-%d')"
            git push origin main
            echo "✅ Summary committed and pushed!"
          fi
      
      - name: Summary
        run: |
          echo "✅ Summary generation completed!"
          echo "📄 Output: ${{ steps.summary.outputs.output_file }}"
      
