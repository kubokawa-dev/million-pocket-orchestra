name: Daily Numbers4 Summary & Notification

on:
  schedule:
    # 平日（月〜金）JST 16:00 に実行
    # JST 16:00 = UTC 07:00
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  summarize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      # Predictionワークフローで保存したDBを復元
      - name: Download database from prediction workflow
        uses: dawidd6/action-download-artifact@v3
        with:
          name: lottery-db-today
          path: .
          workflow: daily-numbers4-prediction.yml
          workflow_conclusion: success
          search_artifacts: true
      
      - name: Check database
        run: |
          echo "📂 Database file info:"
          ls -la lottery.db || echo "❌ lottery.db not found"
          echo ""
          echo "📊 Prediction count:"
          python -c "
          import sqlite3
          conn = sqlite3.connect('lottery.db')
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM numbers4_ensemble_predictions')
          count = cur.fetchone()[0]
          print(f'  Total predictions: {count}')
          conn.close()
          " || echo "❌ Failed to query database"
      
      - name: Generate prediction summary
        id: summary
        run: |
          # 予測サマリーをMarkdownで生成
          OUTPUT_FILE="predictions/numbers4_$(date '+%Y%m%d').md"
          python numbers4/summarize_daily_predictions.py --output "$OUTPUT_FILE"
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
          
          # サマリーの内容を環境変数に保存（通知用）
          echo "SUMMARY_CONTENT<<EOF" >> $GITHUB_ENV
          head -100 "$OUTPUT_FILE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      
      - name: Commit summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add predictions/
          git diff --staged --quiet || git commit -m "📊 Numbers4 daily summary $(date '+%Y-%m-%d')"
          git push
      
      - name: Summary
        run: |
          echo "✅ Summary generation completed!"
          echo "📄 Output: ${{ steps.summary.outputs.output_file }}"
      
