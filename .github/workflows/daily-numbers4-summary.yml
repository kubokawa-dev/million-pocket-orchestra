name: Daily Numbers4 Summary & Notification

on:
  schedule:
    # 平日（月〜金）JST 12:00 に実行（予測完了後すぐ！）
    # JST 12:00 = UTC 03:00
    - cron: '0 3 * * 1-5'
  workflow_dispatch:  # 手動実行も可能
    inputs:
      target_preset:
        description: '固定チェック対象のプリセット（おすすめ: 標準=日常運用 / 攻め=広く拾う / コールド狙い=穴狙い）'
        required: false
        type: choice
        default: '標準'
        options:
          - 標準
          - 攻め
          - コールド狙い
          - カスタム
      target_numbers:
        description: '固定チェック対象番号（カンマ区切り / preset=custom のとき使用）'
        required: false
        default: '4111,1263,2404'
      method_preset:
        description: '固定チェック対象メソッドのプリセット（おすすめ: 標準×ボックス重視 / 攻め×全方位）'
        required: false
        type: choice
        default: '標準'
        options:
          - 標準
          - ボックス重視
          - 全方位
          - カスタム
      target_methods:
        description: '固定チェック対象メソッド（カンマ区切り / method_preset=カスタム のとき使用）'
        required: false
        default: 'box_model,cold_revival'
      preset_guide:
        description: 'おすすめ組み合わせ（表示専用）'
        required: false
        type: choice
        default: '標準 × ボックス重視（安定運用）'
        options:
          - 標準 × ボックス重視（安定運用）
          - 攻め × 全方位（取りこぼし抑制）
          - コールド狙い × 標準（穴狙い）

jobs:
  summarize:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Pull latest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database and load CSV data
        run: |
          echo "🗄️ Initializing database..."
          python tools/utils.py
          echo "📂 Loading historical data from CSV..."
          python tools/load_csv_to_db.py
      
      - name: Get latest draw number
        id: draw
        run: |
          echo "📂 Looking for latest prediction data..."
          # 新形式: numbers4_{draw}.json を優先
          LATEST_FILE=$(ls -1 predictions/daily/numbers4_*.json 2>/dev/null | sort -t'_' -k2 -n | tail -1 || true)
          
          if [ -z "$LATEST_FILE" ]; then
            # 旧形式: {draw}.json にフォールバック
            LATEST_FILE=$(ls -1 predictions/daily/*.json 2>/dev/null | grep -E '/[0-9]+\.json$' | sort -t'/' -k3 -n | tail -1 || true)
          fi
          
          if [ -n "$LATEST_FILE" ]; then
            # ファイル名から回号を抽出 (numbers4_6891.json -> 6891 or 6891.json -> 6891)
            BASENAME=$(basename "$LATEST_FILE" .json)
            if [[ "$BASENAME" == numbers4_* ]]; then
              DRAW_NUMBER="${BASENAME#numbers4_}"
            else
              DRAW_NUMBER="$BASENAME"
            fi
            echo "✅ Found $LATEST_FILE (Draw #$DRAW_NUMBER)"
            echo "draw_number=$DRAW_NUMBER" >> $GITHUB_OUTPUT
            python -c "
          import json
          with open('$LATEST_FILE', 'r') as f:
              data = json.load(f)
          print(f'  📊 Prediction count: {len(data.get(\"predictions\", []))}')
          print(f'  🎯 Target draw: {data.get(\"target_draw_number\", data.get(\"draw_number\"))}')
          "
          else
            # 旧形式（日付ベース）を探す
            TODAY=$(date '+%Y%m%d')
            if [ -f "predictions/daily/${TODAY}.json" ]; then
              echo "✅ Found predictions/daily/${TODAY}.json (legacy format)"
              DRAW_NUMBER=$(python -c "
          import json
          with open('predictions/daily/${TODAY}.json', 'r') as f:
              data = json.load(f)
          print(data.get('target_draw_number', ''))
          ")
              echo "draw_number=$DRAW_NUMBER" >> $GITHUB_OUTPUT
            else
              echo "⚠️ No prediction data found"
              echo "Available files:"
              ls -la predictions/daily/ || echo "No daily predictions directory"
            fi
          fi
      
      - name: Check all methods completed
        id: check_methods
        run: |
          DRAW_NUMBER="${{ steps.draw.outputs.draw_number }}"
          if [ -z "$DRAW_NUMBER" ]; then
            echo "⚠️ No draw number found, skipping method check"
            echo "all_methods_ready=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          METHODS_DIR="predictions/daily/methods"
          EXPECTED_METHODS="box_model ml_neighborhood even_odd_pattern low_sum_specialist sequential_pattern cold_revival hot_pair box_pattern digit_freq_box global_frequency lightgbm state_chain"
          
          MISSING=""
          FOUND=0
          TOTAL=0
          
          for METHOD in $EXPECTED_METHODS; do
            TOTAL=$((TOTAL + 1))
            FILE="${METHODS_DIR}/${METHOD}/numbers4_${DRAW_NUMBER}.json"
            if [ -f "$FILE" ]; then
              FOUND=$((FOUND + 1))
              echo "✅ $METHOD - OK"
            else
              MISSING="${MISSING} ${METHOD}"
              echo "❌ $METHOD - NOT FOUND"
            fi
          done
          
          echo "📊 メソッド状況: ${FOUND}/${TOTAL} 完了"
          
          if [ -n "$MISSING" ]; then
            echo "⚠️ 未完了メソッド:${MISSING}"
            # 1件以上あればサマリーを生成（不足分は可能な範囲で集計）
            if [ $FOUND -ge 1 ]; then
              echo "✅ ${FOUND}件完了しているのでサマリー生成を続行"
              echo "all_methods_ready=true" >> $GITHUB_OUTPUT
            else
              echo "❌ 完了メソッドがありません（${FOUND}/12）"
              echo "all_methods_ready=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "🎉 全メソッド完了！"
            echo "all_methods_ready=true" >> $GITHUB_OUTPUT
          fi
          echo "found_count=$FOUND" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL" >> $GITHUB_OUTPUT
      
      - name: Generate summary from JSON
        if: steps.check_methods.outputs.all_methods_ready == 'true'
        id: summary
        run: |
          DRAW_NUMBER="${{ steps.draw.outputs.draw_number }}"
          if [ -n "$DRAW_NUMBER" ]; then
            OUTPUT_FILE="predictions/numbers4_${DRAW_NUMBER}.md"
            python numbers4/summarize_from_json.py \
              --draw "$DRAW_NUMBER" \
              --output "$OUTPUT_FILE" \
              --methods-dir "predictions/daily/methods"
          else
            # 回号が取得できない場合は日付ベースで試行
            OUTPUT_FILE="predictions/numbers4_$(date '+%Y%m%d').md"
            python numbers4/summarize_from_json.py \
              --output "$OUTPUT_FILE" \
              --methods-dir "predictions/daily/methods"
          fi
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT

      - name: Add target-number check section
        if: steps.check_methods.outputs.all_methods_ready == 'true'
        id: target_check
        run: |
          DRAW_NUMBER="${{ steps.draw.outputs.draw_number }}"
          TARGET_PRESET="${{ github.event.inputs.target_preset }}"
          METHOD_PRESET="${{ github.event.inputs.method_preset }}"
          TARGET_NUMBERS="${{ github.event.inputs.target_numbers }}"
          TARGET_METHODS="${{ github.event.inputs.target_methods }}"

          # スケジュール実行時など input が空なら standard 扱い
          if [ -z "$TARGET_PRESET" ]; then
            TARGET_PRESET="標準"
          fi

          # プリセットに応じて番号セットを決定
          case "$TARGET_PRESET" in
            standard|標準)
              TARGET_NUMBERS="4111,1263,2404"
              ;;
            aggressive|攻め)
              TARGET_NUMBERS="4111,1263,2404,6376,8958,0100"
              ;;
            cold_focus|コールド狙い)
              TARGET_NUMBERS="2214,1404,6001,3957,3381"
              ;;
            custom|カスタム)
              if [ -z "$TARGET_NUMBERS" ]; then
                TARGET_NUMBERS="4111,1263,2404"
              fi
              ;;
            *)
              echo "⚠️ Unknown preset '$TARGET_PRESET'. Fallback to 標準."
              TARGET_PRESET="標準"
              TARGET_NUMBERS="4111,1263,2404"
              ;;
          esac

          if [ -z "$TARGET_NUMBERS" ]; then
            TARGET_NUMBERS="4111,1263,2404"
          fi

          # メソッドプリセットを決定
          if [ -z "$METHOD_PRESET" ]; then
            METHOD_PRESET="標準"
          fi

          case "$METHOD_PRESET" in
            standard|標準)
              TARGET_METHODS="box_model,cold_revival"
              ;;
            box_focus|ボックス重視)
              TARGET_METHODS="box_model,cold_revival,box_pattern,digit_freq_box,hot_pair,lgbm_box"
              ;;
            all_round|全方位)
              TARGET_METHODS="box_model,cold_revival,box_pattern,digit_freq_box,hot_pair,lgbm_box,global_frequency,state_chain,lightgbm,ml_neighborhood,adjacent_digit,even_odd_pattern,low_sum_specialist,sequential_pattern"
              ;;
            custom|カスタム)
              if [ -z "$TARGET_METHODS" ]; then
                TARGET_METHODS="box_model,cold_revival"
              fi
              ;;
            *)
              echo "⚠️ Unknown method preset '$METHOD_PRESET'. Fallback to 標準."
              METHOD_PRESET="標準"
              TARGET_METHODS="box_model,cold_revival"
              ;;
          esac

          if [ -z "$TARGET_METHODS" ]; then
            TARGET_METHODS="box_model,cold_revival"
          fi
          TMP_REPORT="/tmp/numbers4_target_check.md"

          if [ -n "$DRAW_NUMBER" ]; then
            python tools/check_numbers4_target_number.py \
              --draw "$DRAW_NUMBER" \
              --numbers "$TARGET_NUMBERS" \
              --methods "$TARGET_METHODS" \
              --output "$TMP_REPORT"
          else
            python tools/check_numbers4_target_number.py \
              --numbers "$TARGET_NUMBERS" \
              --methods "$TARGET_METHODS" \
              --output "$TMP_REPORT"
          fi

          # 生成済みの日次サマリー末尾に追記
          {
            echo ""
            echo "## 🎯 固定ターゲット番号チェック（CI自動判定）"
            echo ""
            cat "$TMP_REPORT"
          } >> "${{ steps.summary.outputs.output_file }}"

          # Actionsサマリーにも載せる
          echo "## 固定ターゲット番号チェック" >> "$GITHUB_STEP_SUMMARY"
          echo "- recommended_combo: \`${{ github.event.inputs.preset_guide }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- preset: \`$TARGET_PRESET\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- method_preset: \`$METHOD_PRESET\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- numbers: \`$TARGET_NUMBERS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- methods: \`$TARGET_METHODS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "$TMP_REPORT" >> "$GITHUB_STEP_SUMMARY"
      
      - name: Generate budget plan (5-slot & 10-slot)
        if: steps.check_methods.outputs.all_methods_ready == 'true'
        id: budget
        run: |
          DRAW_NUMBER="${{ steps.draw.outputs.draw_number }}"
          if [ -n "$DRAW_NUMBER" ]; then
            echo "💰 Generating budget plan for draw #${DRAW_NUMBER}..."
            python numbers4/generate_budget_plan.py --draw "$DRAW_NUMBER"
            echo "✅ Budget plan generated!"
          else
            echo "⚠️ Skip budget plan generation (no draw number)"
          fi
      
      - name: Upsert numbers4_daily_prediction_documents (Supabase)
        if: steps.check_methods.outputs.all_methods_ready == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python tools/load_numbers4_daily_json_to_postgres.py --skip-if-unconfigured --chunk-size 12
      
      - name: Commit summary
        if: steps.check_methods.outputs.all_methods_ready == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add predictions/*.md predictions/daily/budget_plan_*.json || true
          
          if git diff --staged --quiet; then
            echo "📝 No summary to commit"
          else
            git commit -m "📊 Numbers4 daily summary & budget plan $(date '+%Y-%m-%d')"
            bash tools/git_push_with_retry.sh main
            echo "✅ Summary & budget plan committed and pushed!"
          fi
      
      - name: Summary
        run: |
          if [ "${{ steps.check_methods.outputs.all_methods_ready }}" == "true" ]; then
            echo "✅ Summary generation completed!"
            echo "📄 Output: ${{ steps.summary.outputs.output_file }}"
            echo "📊 Methods: ${{ steps.check_methods.outputs.found_count }}/${{ steps.check_methods.outputs.total_count }}"
          else
            echo "⚠️ Summary generation skipped (not enough methods completed)"
            echo "📊 Methods: ${{ steps.check_methods.outputs.found_count }}/${{ steps.check_methods.outputs.total_count }}"
          fi
      
      # ========================================
      # 通知設定（使いたいものをコメント解除してね！）
