name: Daily Numbers4 Prediction

on:
  schedule:
    # 平日（月〜金）JST 6:00〜15:00 の毎時実行（計10回）
    # JST 06:00〜08:00 = UTC 21:00〜23:00（前日）
    - cron: '0 21-23 * * 0-4'  # 日〜木の21-23時 UTC = 月〜金の06-08時 JST
    # JST 09:00〜15:00 = UTC 00:00〜06:00
    - cron: '0 0-6 * * 1-5'    # 月〜金の00-06時 UTC = 月〜金の09-15時 JST
  workflow_dispatch:  # 手動実行も可能

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      - name: Run Numbers4 prediction pipeline
        run: python tools/run_numbers4_pipeline.py
      
      # Note: lottery.db is in .gitignore, so we don't commit it.
      # Predictions are stored in the DB during the workflow run.
      # If you need to persist predictions, consider using artifacts or a remote database.
      - name: Summary
        run: |
          echo "✅ Numbers4 prediction completed successfully!"
          echo "📊 Predictions have been saved to the local database."

