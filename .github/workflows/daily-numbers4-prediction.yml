name: Daily Numbers4 Prediction

on:
  schedule:
    # 平日（月〜金）JST 3:00〜11:30 の30分おき実行（計18回）
    # JST 03:00〜08:30 = UTC 18:00〜23:30（前日）
    - cron: '0,30 18-23 * * 0-4'  # 日〜木の18-23時 UTC = 月〜金の03:00〜08:30 JST
    # JST 09:00〜11:30 = UTC 00:00〜02:30
    - cron: '0,30 0-2 * * 1-5'    # 月〜金の00-02時 UTC = 月〜金の09:00〜11:30 JST
  workflow_dispatch:  # 手動実行も可能

jobs:
  predict:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write  # サマリーワークフローをトリガーするために必要
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 最新のコミットを取得（他のワークフロー実行分も含む）
          fetch-depth: 0
      
      - name: Pull latest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase || true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      - name: Load historical data from CSV to DB
        run: |
          echo "📂 Loading historical data from CSV files..."
          python tools/load_csv_to_db.py
      
      - name: Select method batch
        id: batch
        run: |
          NOW_HOUR=$(TZ=Asia/Tokyo date +%H)
          NOW_MIN=$(TZ=Asia/Tokyo date +%M)
          HOUR=$((10#$NOW_HOUR))
          MIN=$((10#$NOW_MIN))
          
          if [ "$HOUR" -lt 3 ] || [ "$HOUR" -gt 11 ]; then
            SLOT=0
          else
            HALF=0
            if [ "$MIN" -ge 30 ]; then
              HALF=1
            fi
            SLOT=$(( (HOUR - 3) * 2 + HALF ))
          fi
          
          # 3グループ × 4メソッド = 12メソッド
          # 18スロット ÷ 3グループ = 各メソッド6回ずつ実行
          GROUP=$(( SLOT % 3 ))
          
          case "$GROUP" in
            0) METHODS="box_model,ml_neighborhood,even_odd_pattern,low_sum_specialist" ;;
            1) METHODS="sequential_pattern,cold_revival,hot_pair,box_pattern" ;;
            2) METHODS="digit_freq_box,global_frequency,lightgbm,state_chain" ;;
          esac
          
          if [ "$SLOT" -eq 0 ]; then
            RUN_ENSEMBLE="true"
          else
            RUN_ENSEMBLE="false"
          fi
          
          echo "slot=$SLOT" >> $GITHUB_OUTPUT
          echo "group=$GROUP" >> $GITHUB_OUTPUT
          echo "methods=$METHODS" >> $GITHUB_OUTPUT
          echo "run_ensemble=$RUN_ENSEMBLE" >> $GITHUB_OUTPUT
          echo "🧭 Slot: $SLOT (Group: $GROUP)"
          echo "🧪 Methods: $METHODS"
          echo "🔮 Run ensemble: $RUN_ENSEMBLE"
      
      - name: Run Numbers4 prediction pipeline
        if: steps.batch.outputs.run_ensemble == 'true'
        run: python tools/run_numbers4_pipeline.py
      
      - name: Run Numbers4 method predictions
        run: |
          python tools/run_numbers4_method_predictions.py \
            --methods "${{ steps.batch.outputs.methods }}" \
            --limit 200 \
            --top 20
      
      - name: Write prediction methods summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          
          preds_dir = Path("predictions/daily")
          files = sorted(preds_dir.glob("numbers4_*.json"), key=lambda p: p.stat().st_mtime, reverse=True)
          if not files:
              print("No prediction JSON found.")
              raise SystemExit(0)
          
          data = json.loads(files[0].read_text(encoding="utf-8"))
          if not data.get("predictions"):
              print("No prediction entries in latest JSON.")
              raise SystemExit(0)
          
          latest = data["predictions"][-1]
          weights = latest.get("ensemble_weights") or {}
          
          lines = []
          lines.append("## 予測手法（アンサンブル重み）")
          if not weights:
              lines.append("- 重み情報が見つかりませんでした")
          else:
              for name, weight in sorted(weights.items(), key=lambda x: (-x[1], x[0])):
                  lines.append(f"- `{name}`: {weight}")
          
          summary = "\n".join(lines)
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(summary + "\n")
          print(summary)
          PY
      
      - name: Commit prediction JSON and CSV
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # predictions/daily/ ディレクトリのJSONをコミット (新形式: numbers4_*.json)
          git add predictions/daily/numbers4_*.json || true
          git add predictions/daily/*.json || true
          
          # 手法別予測JSON
          git add predictions/daily/methods/**/numbers4_*.json || true
          
          # numbers4/ ディレクトリのCSVもコミット（スクレイピング結果）
          git add numbers4/*.csv || true
          
          if git diff --staged --quiet; then
            echo "📝 No new predictions to commit"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
            git commit -m "🔮 Numbers4 prediction $TIMESTAMP"
            git push origin main
            echo "✅ Prediction committed and pushed!"
          fi
      
      - name: Summary
        run: |
          echo "✅ Numbers4 prediction completed successfully!"
          echo "📊 Predictions saved to predictions/daily/"
