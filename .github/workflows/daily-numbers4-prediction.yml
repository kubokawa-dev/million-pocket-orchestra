name: Daily Numbers4 Prediction

on:
  schedule:
    # 平日（月〜金）JST 1:00〜11:40 の20分おき実行
    # JST 01:00〜08:40 = UTC 16:00〜23:40（前日）
    - cron: '*/20 16-23 * * 0-4'  # 日〜木の16-23時 UTC = 月〜金の01:00〜08:40 JST
    # JST 09:00〜11:40 = UTC 00:00〜02:40
    - cron: '*/20 0-2 * * 1-5'    # 月〜金の00-02時 UTC = 月〜金の09:00〜11:40 JST
  workflow_dispatch:
    inputs:
      methods:
        description: '実行するメソッド（カンマ区切り、空欄=自動選択）'
        required: false
        type: string
        default: ''
      run_ensemble:
        description: 'アンサンブル予測も実行する'
        required: false
        type: boolean
        default: false
      run_all_methods:
        description: '全14メソッドを一括実行'
        required: false
        type: boolean
        default: false

jobs:
  predict:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write  # サマリーワークフローをトリガーするために必要
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # 最新のコミットを取得（他のワークフロー実行分も含む）
          fetch-depth: 0
      
      - name: Pull latest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      - name: Load historical data from CSV to DB
        run: |
          echo "📂 Loading historical data from CSV files..."
          python tools/load_csv_to_db.py
      
      - name: Select method batch
        id: batch
        run: |
          ALL_METHODS="box_model,ml_neighborhood,even_odd_pattern,lgbm_box,sequential_pattern,cold_revival,hot_pair,adjacent_digit,digit_freq_box,global_frequency,lightgbm,state_chain,box_pattern,low_sum_specialist"

          # --- 手動実行: inputs を優先 ---
          MANUAL_METHODS="${{ inputs.methods }}"
          MANUAL_ENSEMBLE="${{ inputs.run_ensemble }}"
          MANUAL_ALL="${{ inputs.run_all_methods }}"

          if [ "$MANUAL_ALL" = "true" ]; then
            METHODS="$ALL_METHODS"
            RUN_ENSEMBLE="true"
            echo "🖐️ 手動実行: 全メソッド一括"
          elif [ -n "$MANUAL_METHODS" ]; then
            METHODS="$MANUAL_METHODS"
            RUN_ENSEMBLE="${MANUAL_ENSEMBLE:-false}"
            echo "🖐️ 手動実行: $METHODS"
          else
            # --- 自動実行: 時刻ベースのスロット選択 ---
            NOW_HOUR=$(TZ=Asia/Tokyo date +%H)
            NOW_MIN=$(TZ=Asia/Tokyo date +%M)
            HOUR=$((10#$NOW_HOUR))
            MIN=$((10#$NOW_MIN))

            if [ "$HOUR" -lt 1 ] || [ "$HOUR" -gt 11 ]; then
              SLOT=0
            else
              MINUTES_SINCE_START=$(( (HOUR - 1) * 60 + MIN ))
              SLOT=$(( MINUTES_SINCE_START / 20 ))
            fi

            GROUP=$(( SLOT % 4 ))

            case "$GROUP" in
              0) METHODS="box_model,ml_neighborhood,even_odd_pattern,lgbm_box" ;;
              1) METHODS="sequential_pattern,cold_revival,hot_pair,adjacent_digit" ;;
              2) METHODS="digit_freq_box,global_frequency,lightgbm,state_chain" ;;
              3) METHODS="box_pattern,low_sum_specialist" ;;
            esac

            if [ "$SLOT" -eq 0 ]; then
              RUN_ENSEMBLE="true"
            else
              RUN_ENSEMBLE="false"
            fi

            echo "🧭 Slot: $SLOT (Group: $GROUP)"
          fi

          echo "methods=$METHODS" >> $GITHUB_OUTPUT
          echo "run_ensemble=$RUN_ENSEMBLE" >> $GITHUB_OUTPUT
          echo "🧪 Methods: $METHODS"
          echo "🔮 Run ensemble: $RUN_ENSEMBLE"
      
      - name: Run Numbers4 prediction pipeline
        if: steps.batch.outputs.run_ensemble == 'true'
        run: python tools/run_numbers4_pipeline.py
      
      - name: Run Numbers4 method predictions
        run: |
          python tools/run_numbers4_method_predictions.py \
            --methods "${{ steps.batch.outputs.methods }}" \
            --limit 200 \
            --top 20
      
      - name: Write prediction methods summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          
          preds_dir = Path("predictions/daily")
          files = sorted(preds_dir.glob("numbers4_*.json"), key=lambda p: p.stat().st_mtime, reverse=True)
          if not files:
              print("No prediction JSON found.")
              raise SystemExit(0)
          
          data = json.loads(files[0].read_text(encoding="utf-8"))
          if not data.get("predictions"):
              print("No prediction entries in latest JSON.")
              raise SystemExit(0)
          
          latest = data["predictions"][-1]
          weights = latest.get("ensemble_weights") or {}
          
          lines = []
          lines.append("## 予測手法（アンサンブル重み）")
          if not weights:
              lines.append("- 重み情報が見つかりませんでした")
          else:
              for name, weight in sorted(weights.items(), key=lambda x: (-x[1], x[0])):
                  lines.append(f"- `{name}`: {weight}")
          
          summary = "\n".join(lines)
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a", encoding="utf-8") as f:
                  f.write(summary + "\n")
          print(summary)
          PY
      
      # predictions/daily の JSON を PostgREST で UPSERT（スキーマは apps/web/supabase/migrations 参照）
      - name: Upsert numbers4_daily_prediction_documents (Supabase)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python tools/load_numbers4_daily_json_to_postgres.py --skip-if-unconfigured --chunk-size 12
      
      - name: Commit prediction JSON and CSV
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # predictions/daily/ ディレクトリのJSONをコミット (新形式: numbers4_*.json)
          git add predictions/daily/numbers4_*.json || true
          git add predictions/daily/*.json || true
          
          # 手法別予測JSON
          git add predictions/daily/methods/**/numbers4_*.json || true
          
          # numbers4/ ディレクトリのCSVもコミット（スクレイピング結果）
          git add numbers4/*.csv || true
          
          if git diff --staged --quiet; then
            echo "📝 No new predictions to commit"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
            git commit -m "🔮 Numbers4 prediction $TIMESTAMP"
            bash tools/git_push_with_retry.sh main
            echo "✅ Prediction committed and pushed!"
          fi
      
      - name: Summary
        run: |
          echo "✅ Numbers4 prediction completed successfully!"
          echo "📊 Predictions saved to predictions/daily/"
