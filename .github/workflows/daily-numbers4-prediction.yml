name: Daily Numbers4 Prediction

on:
  schedule:
    # 平日（月〜金）JST 6:00〜15:00 の毎時実行（計10回）
    # JST 06:00〜08:00 = UTC 21:00〜23:00（前日）
    - cron: '0 21-23 * * 0-4'  # 日〜木の21-23時 UTC = 月〜金の06-08時 JST
    # JST 09:00〜15:00 = UTC 00:00〜06:00
    - cron: '0 0-6 * * 1-5'    # 月〜金の00-06時 UTC = 月〜金の09-15時 JST
  workflow_dispatch:  # 手動実行も可能

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      - name: Run Numbers4 prediction pipeline
        run: python tools/run_numbers4_pipeline.py
      
      - name: Generate prediction summary
        id: summary
        run: |
          # 予測サマリーをMarkdownで生成
          OUTPUT_FILE="predictions/numbers4_$(date '+%Y%m%d').md"
          python numbers4/summarize_daily_predictions.py --output "$OUTPUT_FILE"
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
          
          # サマリーの内容を環境変数に保存（通知用）
          echo "SUMMARY_CONTENT<<EOF" >> $GITHUB_ENV
          head -100 "$OUTPUT_FILE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      
      - name: Commit summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add predictions/
          git diff --staged --quiet || git commit -m "📊 Numbers4 prediction $(date '+%Y-%m-%d %H:%M')"
          git push
      
      - name: Summary
        run: |
          echo "✅ Numbers4 prediction completed successfully!"
          echo "📊 Summary saved to: ${{ steps.summary.outputs.output_file }}"
