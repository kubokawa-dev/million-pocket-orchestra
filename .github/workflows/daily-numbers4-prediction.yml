name: Daily Numbers4 Prediction

on:
  schedule:
    # 平日（月〜金）JST 6:00〜15:00 の毎時実行（計10回）
    # JST 06:00〜08:00 = UTC 21:00〜23:00（前日）
    - cron: '0 21-23 * * 0-4'  # 日〜木の21-23時 UTC = 月〜金の06-08時 JST
    # JST 09:00〜15:00 = UTC 00:00〜06:00
    - cron: '0 0-6 * * 1-5'    # 月〜金の00-06時 UTC = 月〜金の09-15時 JST
  workflow_dispatch:  # 手動実行も可能

jobs:
  predict:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 最新のコミットを取得（他のワークフロー実行分も含む）
          fetch-depth: 0
      
      - name: Pull latest changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main --rebase || true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      - name: Run Numbers4 prediction pipeline
        run: python tools/run_numbers4_pipeline.py
      
      - name: Commit prediction JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # predictions/daily/ ディレクトリのJSONをコミット (新形式: numbers4_*.json)
          git add predictions/daily/numbers4_*.json || true
          git add predictions/daily/*.json || true
          
          if git diff --staged --quiet; then
            echo "📝 No new predictions to commit"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
            git commit -m "🔮 Numbers4 prediction $TIMESTAMP"
            git push origin main
            echo "✅ Prediction committed and pushed!"
          fi
      
      - name: Summary
        run: |
          echo "✅ Numbers4 prediction completed successfully!"
          echo "📊 Predictions saved to predictions/daily/"
