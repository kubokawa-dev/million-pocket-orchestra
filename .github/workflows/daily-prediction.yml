name: Daily Lottery Prediction

on:
  schedule:
    # UTC 8:00 = JST 17:00（抽選18:45の約2時間前）
    - cron: '0 8 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Initialize database
        run: python tools/utils.py
      
      - name: Run Numbers4 prediction pipeline
        run: python tools/run_numbers4_pipeline.py
      
      - name: Run Loto6 prediction pipeline
        run: python tools/run_loto6_pipeline.py
      
      - name: Commit database changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add lottery.db
          git diff --staged --quiet || git commit -m "🎰 Daily prediction update $(date '+%Y-%m-%d')"
          git push
      
      # LINE通知（オプション - シークレット設定後に有効化）
      # - name: Send LINE notification
      #   env:
      #     LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      #   run: python tools/send_notification.py

